<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="INNOVING SOLUTIONS">
  <!-- Maison -->
  <path d="M20 89 L20 45 L50 18 L80 45 L80 89 Z"
        fill="none" stroke="#1aa24a" stroke-width="6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Engrenage (dents) -->
  <g fill="#f5b51e">
    <g>
      <rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/>
    </g>
    <g transform="rotate(45 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
    <g transform="rotate(90 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
    <g transform="rotate(135 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
    <g transform="rotate(180 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
    <g transform="rotate(225 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
    <g transform="rotate(270 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
    <g transform="rotate(315 50 52)"><rect x="46.2" y="28" width="7.6" height="11" rx="1.6"/></g>
  </g>

  <!-- Corps de l'engrenage (anneau jaune) -->
  <circle cx="50" cy="52" r="14" fill="none" stroke="#f5b51e" stroke-width="9"/>

  <!-- Wi-Fi (vert) -->
  <g fill="none" stroke="#1aa24a" stroke-width="2.6" stroke-linecap="round">
    <path d="M43 55 A7 7 0 0 1 57 55"/>
    <path d="M46.5 55 A3.5 3.5 0 0 1 53.5 55"/>
  </g>
  <circle cx="50" cy="57" r="2.3" fill="#1aa24a"/>
</svg>
